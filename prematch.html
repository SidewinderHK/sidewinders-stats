<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Match Analysis - Sidewinders</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
        }
        
        .analysis-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .team-selector {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .team-input {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            font-family: monospace;
        }
        
        .team-input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .prediction-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .progress {
            border-radius: 25px;
            overflow: hidden;
        }
        
        .progress-bar {
            font-weight: bold;
            transition: width 0.5s ease;
        }
        
        .team-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 10px;
            height: 100%;
        }
        
        .team-card h4 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .stat {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .key-factors, .head-to-head, .insights {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .key-players {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 15px;
        }
        
        .player-highlight {
            padding: 10px;
            margin: 5px;
            background: white;
            border-radius: 10px;
            text-align: center;
        }
        
        .player-stat {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-analyze:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .preset-teams {
            margin-top: 15px;
            padding: 15px;
            background: #e8eaf6;
            border-radius: 10px;
        }
        
        .vs-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin: 0 auto;
        }
        
        .badge {
            font-size: 14px;
            padding: 5px 10px;
        }
        
        @media (max-width: 768px) {
            .vs-circle {
                margin: 15px auto;
            }
            
            .team-card {
                margin: 10px 0;
            }
        }
        
        .player-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .data-reliability {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="analysis-card">
            <h1 class="text-center mb-4">
                <i class="fas fa-chart-line"></i> Pre-Match Analysis
            </h1>
            <p class="text-center text-muted">
                Enter the two teams to get a data-driven prediction based on player history, form, and team chemistry
            </p>
            
            <div class="team-selector">
                <div class="row">
                    <div class="col-md-5">
                        <label class="form-label fw-bold">
                            <i class="fas fa-users"></i> Team 1 Players
                        </label>
                        <textarea id="team1Players" class="team-input" rows="5" 
                            placeholder="Enter player names, one per line&#10;Example:&#10;John Smith&#10;Mike Johnson&#10;Sarah Williams"></textarea>
                    </div>
                    <div class="col-md-2 text-center d-flex align-items-center justify-content-center">
                        <div class="vs-circle">VS</div>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-bold">
                            <i class="fas fa-users"></i> Team 2 Players
                        </label>
                        <textarea id="team2Players" class="team-input" rows="5" 
                            placeholder="Enter player names, one per line&#10;Example:&#10;David Brown&#10;Lisa Davis&#10;Tom Wilson"></textarea>
                    </div>
                </div>
                
                <div class="preset-teams">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <strong><i class="fas fa-bolt"></i> Quick Load:</strong>
                        </div>
                        <div class="col-md-9">
                            <button class="btn btn-sm btn-outline-primary preset-btn" onclick="loadPreset('recent')">
                                <i class="fas fa-clock"></i> Most Recent Teams
                            </button>
                            <button class="btn btn-sm btn-outline-success preset-btn" onclick="loadPreset('top')">
                                <i class="fas fa-trophy"></i> Top Rated Players
                            </button>
                            <button class="btn btn-sm btn-outline-info preset-btn" onclick="loadPreset('balanced')">
                                <i class="fas fa-balance-scale"></i> Balanced Teams
                            </button>
                            <button class="btn btn-sm btn-outline-secondary preset-btn" onclick="clearTeams()">
                                <i class="fas fa-eraser"></i> Clear
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button class="btn-analyze" onclick="analyzeMatchup()">
                        <i class="fas fa-chart-line"></i> Analyze Matchup
                    </button>
                </div>
            </div>
        </div>
        
        <div id="results" style="display: none;"></div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script src="prematch.js"></script>
    
    <script>
        let gameLog = [];
        let leagueTable = [];
        let analyzer = null;
        
        // Load game data and league table
        async function loadGameData() {
            try {
                // First try to get league table from the existing app
                if (window.sidewindersApp && window.sidewindersApp.leagueTable) {
                    leagueTable = window.sidewindersApp.leagueTable;
                    gameLog = window.sidewindersApp.gameLog;
                    console.log("Loaded data from existing app instance");
                } else {
                    // Fallback: load CSV directly
                    const response = await fetch('GameLog.csv');
                    const csvText = await response.text();
                    gameLog = parseCSV(csvText);
                    
                    // Calculate basic league table
                    leagueTable = calculateBasicLeagueTable(gameLog);
                }
                
                analyzer = new PreMatchAnalyzer(gameLog, leagueTable);
                console.log("Pre-match analyzer ready with", gameLog.length, "games and", leagueTable.length, "players");
                
                // Enable analyze button
                document.querySelector('.btn-analyze').disabled = false;
                
            } catch (error) {
                console.error("Error loading data:", error);
                alert("Could not load GameLog.csv. Please ensure the file exists.");
            }
        }
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.replace(/^"(.*)"$/, '$1').trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const row = {};
                headers.forEach((header, index) => {
                    if (values[index] !== undefined) {
                        let value = values[index].replace(/^"(.*)"$/, '$1').trim();
                        row[header] = value;
                    }
                });
                data.push(row);
            }
            return data;
        }
        
        function calculateBasicLeagueTable(gameLog) {
            const playerStats = {};
            
            gameLog.forEach(game => {
                const player = game['Player'];
                if (!player) return;
                
                if (!playerStats[player]) {
                    playerStats[player] = {
                        Player: player,
                        Games: 0,
                        Wins: 0,
                        Draws: 0,
                        Losses: 0,
                        Goals: 0,
                        Assists: 0,
                        TotalPoints: 0
                    };
                }
                
                const stats = playerStats[player];
                stats.Games++;
                
                const result = game['Result'];
                if (result === 'Win') {
                    stats.Wins++;
                    stats.TotalPoints += 3;
                } else if (result === 'Draw') {
                    stats.Draws++;
                    stats.TotalPoints += 1;
                } else if (result === 'Loss') {
                    stats.Losses++;
                }
                
                stats.Goals += parseInt(game['Gls']) || 0;
                stats.Assists += parseInt(game['Ast']) || 0;
            });
            
            // Calculate PPG
            Object.values(playerStats).forEach(stats => {
                stats.PPG = stats.Games > 0 ? (stats.TotalPoints / stats.Games).toFixed(2) : 0;
                stats.WinPercent = stats.Games > 0 ? (stats.Wins / stats.Games * 100).toFixed(1) : 0;
            });
            
            return Object.values(playerStats);
        }
        
        function analyzeMatchup() {
            const team1Text = document.getElementById('team1Players').value;
            const team2Text = document.getElementById('team2Players').value;
            
            const team1Players = team1Text.split('\n').filter(p => p.trim() !== '');
            const team2Players = team2Text.split('\n').filter(p => p.trim() !== '');
            
            if (team1Players.length === 0 || team2Players.length === 0) {
                alert("Please enter players for both teams");
                return;
            }
            
            if (!analyzer) {
                alert("Data still loading. Please wait...");
                return;
            }
            
            // Show loading
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').innerHTML = `
                <div class="analysis-card">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p class="mt-3">Analyzing matchup based on ${analyzer.gameLog.length} historical games...</p>
                        <p class="text-muted small">Analyzing player performance, form, and team chemistry...</p>
                    </div>
                </div>
            `;
            
            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            
            // Perform analysis
            setTimeout(() => {
                const analysis = analyzer.analyzeTeams(team1Players, team2Players);
                const html = analyzer.generateHTMLReport(analysis);
                document.getElementById('results').innerHTML = html;
            }, 500);
        }
        
        function loadPreset(type) {
            if (!analyzer) {
                alert("Data still loading...");
                return;
            }
            
            const allPlayers = analyzer.playerStats;
            const playerList = Object.values(allPlayers).sort((a, b) => b.games - a.games);
            
            if (type === 'recent') {
                // Load most recent teams from last game
                const recentGames = [...gameLog].reverse();
                const lastGameId = recentGames[0]?.ID;
                const lastGameTeams = gameLog.filter(g => g.ID === lastGameId);
                
                if (lastGameTeams.length > 0) {
                    const team1 = lastGameTeams.filter(t => t.Team === lastGameTeams[0].Team).map(t => t.Player);
                    const team2 = lastGameTeams.filter(t => t.Team !== lastGameTeams[0].Team).map(t => t.Player);
                    
                    document.getElementById('team1Players').value = team1.join('\n');
                    document.getElementById('team2Players').value = team2.join('\n');
                }
            } else if (type === 'top') {
                // Load top 6 players by PPG (minimum 5 games)
                const topPlayers = Object.values(allPlayers)
                    .filter(p => p.games >= 5)
                    .sort((a, b) => b.ppg - a.ppg)
                    .slice(0, 6);
                
                const team1 = topPlayers.slice(0, 3).map(p => p.name);
                const team2 = topPlayers.slice(3, 6).map(p => p.name);
                
                document.getElementById('team1Players').value = team1.join('\n');
                document.getElementById('team2Players').value = team2.join('\n');
            } else if (type === 'balanced') {
                // Create balanced teams based on PPG
                const qualifiedPlayers = Object.values(allPlayers)
                    .filter(p => p.games >= 3)
                    .sort((a, b) => b.ppg - a.ppg);
                
                const team1 = [];
                const team2 = [];
                
                qualifiedPlayers.forEach((player, index) => {
                    if (index % 2 === 0) {
                        team1.push(player.name);
                    } else {
                        team2.push(player.name);
                    }
                });
                
                document.getElementById('team1Players').value = team1.slice(0, 6).join('\n');
                document.getElementById('team2Players').value = team2.slice(0, 6).join('\n');
            }
        }
        
        function clearTeams() {
            document.getElementById('team1Players').value = '';
            document.getElementById('team2Players').value = '';
        }
        
        // Initialize
        loadGameData();
    </script>
</body>
</html>
