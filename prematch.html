<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Match Analysis - Sidewinders</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
        }
        
        .analysis-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .team-selector {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .team-input {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            font-family: monospace;
        }
        
        .team-input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-analyze:hover {
            transform: translateY(-2px);
        }
        
        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-share {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-left: 10px;
        }
        
        .btn-share:hover {
            transform: translateY(-2px);
        }
        
        .vs-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin: 0 auto;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .player-stat {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .progress {
            height: 30px;
            border-radius: 15px;
        }
        
        .progress-bar {
            line-height: 30px;
            font-weight: bold;
        }
        
        .share-section {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        
        .share-url {
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            border: 1px solid #dee2e6;
        }
        
        .share-url:hover {
            background: #e9ecef;
        }
        
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 768px) {
            .vs-circle {
                margin: 15px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="analysis-card">
            <h1 class="text-center mb-4">
                <i class="fas fa-chart-line"></i> Pre-Match Analysis
            </h1>
            <p class="text-center text-muted">
                Enter players for both teams to get a data-driven prediction
            </p>
            
            <div class="team-selector">
                <div class="row">
                    <div class="col-md-5">
                        <label class="form-label fw-bold">
                            <i class="fas fa-tshirt"></i> White Team Players
                        </label>
                        <textarea id="whiteTeamPlayers" class="team-input" rows="5" 
                            placeholder="Enter player names, one per line&#10;Example:&#10;John Smith&#10;Mike Johnson&#10;Sarah Williams"></textarea>
                    </div>
                    <div class="col-md-2 text-center d-flex align-items-center justify-content-center">
                        <div class="vs-circle">VS</div>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-bold">
                            <i class="fas fa-palette"></i> Colour Team Players
                        </label>
                        <textarea id="colourTeamPlayers" class="team-input" rows="5" 
                            placeholder="Enter player names, one per line&#10;Example:&#10;David Brown&#10;Lisa Davis&#10;Tom Wilson"></textarea>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button class="btn-analyze" onclick="analyzeMatchup()">
                        <i class="fas fa-chart-line"></i> Analyze Matchup
                    </button>
                </div>
            </div>
        </div>
        
        <div id="results" style="display: none;"></div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="prematch.js"></script>
    
    <script>
        let analyzer = null;
        let dataLoaded = false;
        
        // Load data from URL parameters on page load
        function loadFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const whiteTeamEncoded = urlParams.get('white');
            const colourTeamEncoded = urlParams.get('colour');
            
            if (whiteTeamEncoded) {
                // Decode the URL parameter
                const whiteTeamDecoded = decodeURIComponent(whiteTeamEncoded);
                // Split by comma and join with newlines
                const players = whiteTeamDecoded.split(',');
                document.getElementById('whiteTeamPlayers').value = players.join('\n');
            }
            
            if (colourTeamEncoded) {
                // Decode the URL parameter
                const colourTeamDecoded = decodeURIComponent(colourTeamEncoded);
                // Split by comma and join with newlines
                const players = colourTeamDecoded.split(',');
                document.getElementById('colourTeamPlayers').value = players.join('\n');
            }
            
            // Auto-analyze if both teams are provided
            if (whiteTeamEncoded && colourTeamEncoded && dataLoaded) {
                setTimeout(() => {
                    analyzeMatchup();
                }, 500);
            }
        }
        
        // Generate shareable URL
        function generateShareableUrl() {
            const whiteTeamText = document.getElementById('whiteTeamPlayers').value;
            const colourTeamText = document.getElementById('colourTeamPlayers').value;
            
            const whiteTeam = whiteTeamText.split('\n').filter(p => p.trim() !== '');
            const colourTeam = colourTeamText.split('\n').filter(p => p.trim() !== '');
            
            if (whiteTeam.length === 0 || colourTeam.length === 0) {
                alert("Please enter both teams before sharing");
                return null;
            }
            
            // Join with commas and then encode
            const whiteParam = encodeURIComponent(whiteTeam.join(','));
            const colourParam = encodeURIComponent(colourTeam.join(','));
            
            const url = new URL(window.location.href);
            url.searchParams.set('white', whiteParam);
            url.searchParams.set('colour', colourParam);
            
            return url.toString();
        }
        
        // Share the current analysis
        async function shareAnalysis() {
            const url = generateShareableUrl();
            if (!url) return;
            
            try {
                await navigator.clipboard.writeText(url);
                showToast("✓ Shareable link copied to clipboard!");
            } catch (err) {
                console.error('Failed to copy:', err);
                // Fallback
                prompt("Copy this link to share:", url);
            }
        }
        
        // Show toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Try to load data from the existing app first
        async function loadData() {
            console.log("Checking for existing app data...");
            
            // Try to get data from the main app
            if (window.sidewindersApp && window.sidewindersApp.gameLog && window.sidewindersApp.gameLog.length > 0) {
                console.log("✓ Using data from main app");
                const gameLog = window.sidewindersApp.gameLog;
                const leagueTable = window.sidewindersApp.leagueTable;
                analyzer = new PreMatchAnalyzer(gameLog, leagueTable);
                dataLoaded = true;
                document.querySelector('.btn-analyze').disabled = false;
                loadFromURL(); // Check URL params after data is loaded
                return true;
            }
            
            // Fallback: Load CSV directly
            console.log("Loading CSV directly...");
            try {
                const response = await fetch('GameLog.csv');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const csvText = await response.text();
                const gameLog = parseCSV(csvText);
                
                if (gameLog.length === 0) {
                    throw new Error("No game data found in CSV");
                }
                
                const leagueTable = calculateBasicLeagueTable(gameLog);
                analyzer = new PreMatchAnalyzer(gameLog, leagueTable);
                dataLoaded = true;
                document.querySelector('.btn-analyze').disabled = false;
                console.log(`✓ Loaded ${gameLog.length} games, ${leagueTable.length} players`);
                loadFromURL(); // Check URL params after data is loaded
                return true;
                
            } catch (error) {
                console.error("Failed to load data:", error);
                showError(error.message);
                return false;
            }
        }
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.replace(/^"(.*)"$/, '$1').trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const row = {};
                headers.forEach((header, index) => {
                    if (values[index] !== undefined) {
                        let value = values[index].replace(/^"(.*)"$/, '$1').trim();
                        row[header] = value;
                    }
                });
                if (row['Player']) {
                    data.push(row);
                }
            }
            return data;
        }
        
        function calculateBasicLeagueTable(gameLog) {
            const playerStats = {};
            
            gameLog.forEach(game => {
                const player = game['Player'];
                if (!player) return;
                
                if (!playerStats[player]) {
                    playerStats[player] = {
                        Player: player,
                        Games: 0,
                        Wins: 0,
                        Draws: 0,
                        Losses: 0,
                        Goals: 0,
                        Assists: 0,
                        TotalPoints: 0
                    };
                }
                
                const stats = playerStats[player];
                stats.Games++;
                
                const result = game['Result'];
                if (result === 'Win') {
                    stats.Wins++;
                    stats.TotalPoints += 3;
                } else if (result === 'Draw') {
                    stats.Draws++;
                    stats.TotalPoints += 1;
                } else if (result === 'Loss') {
                    stats.Losses++;
                }
                
                stats.Goals += parseInt(game['Gls']) || 0;
                stats.Assists += parseInt(game['Ast']) || 0;
            });
            
            Object.values(playerStats).forEach(stats => {
                stats.PPG = stats.Games > 0 ? (stats.TotalPoints / stats.Games).toFixed(2) : 0;
                stats.WinPercent = stats.Games > 0 ? (stats.Wins / stats.Games * 100).toFixed(1) : 0;
                stats.goalsPerGame = stats.Games > 0 ? stats.Goals / stats.Games : 0;
                stats.reliability = Math.min(1, stats.Games / 20);
            });
            
            return Object.values(playerStats);
        }
        
        function showError(message) {
            const errorHtml = `
                <div class="analysis-card">
                    <div class="alert alert-danger">
                        <h5><i class="fas fa-exclamation-triangle"></i> Error Loading Data</h5>
                        <p>${message}</p>
                        <hr>
                        <p><strong>Troubleshooting for GitHub Pages:</strong></p>
                        <ul>
                            <li>Make sure <code>GameLog.csv</code> is in the <strong>same folder</strong> as this HTML file</li>
                            <li>Check the filename capitalization - it must be exactly <code>GameLog.csv</code></li>
                            <li>Verify the file was committed and pushed to GitHub</li>
                        </ul>
                        <button class="btn btn-primary btn-sm mt-2" onclick="location.reload()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').innerHTML = errorHtml;
        }
        
        async function analyzeMatchup() {
            const whiteTeamText = document.getElementById('whiteTeamPlayers').value;
            const colourTeamText = document.getElementById('colourTeamPlayers').value;
            
            const whiteTeam = whiteTeamText.split('\n').filter(p => p.trim() !== '');
            const colourTeam = colourTeamText.split('\n').filter(p => p.trim() !== '');
            
            if (whiteTeam.length === 0 || colourTeam.length === 0) {
                alert("Please enter players for both teams");
                return;
            }
            
            if (!dataLoaded) {
                alert("Data is still loading. Please wait...");
                return;
            }
            
            // Show loading
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').innerHTML = `
                <div class="analysis-card">
                    <div class="loading text-center">
                        <div class="spinner"></div>
                        <p class="mt-3">Analyzing matchup based on ${analyzer.gameLog.length} historical games...</p>
                    </div>
                </div>
            `;
            
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            
            // Perform analysis
            setTimeout(() => {
                try {
                    const analysis = analyzer.analyzeTeams(whiteTeam, colourTeam);
                    
                    // Override team names in prediction key factors (replace "Team 1" and "Team 2")
                    if (analysis.prediction && analysis.prediction.keyFactors) {
                        analysis.prediction.keyFactors = analysis.prediction.keyFactors.map(factor => 
                            factor.replace(/Team 1/g, 'White Team').replace(/Team 2/g, 'Colour Team')
                        );
                    }
                    
                    // Override the predicted winner
                    if (analysis.prediction) {
                        analysis.prediction.predictedWinner = analysis.prediction.predictedWinner === "Team 1" ? "White Team" : "Colour Team";
                    }
                    
                    // Override team names in head-to-head stats if they exist
                    if (analysis.headToHead) {
                        // The head-to-head object doesn't have team names directly, but we can add them for display
                        analysis.headToHead.team1Name = "White Team";
                        analysis.headToHead.team2Name = "Colour Team";
                    }
                    
                    // Override team names in the teams themselves
                    analysis.team1.name = "White Team";
                    analysis.team2.name = "Colour Team";
                    
                    // Also override any "Team 1" or "Team 2" in insights
                    if (analysis.insights) {
                        analysis.insights = analysis.insights.map(insight => 
                            insight.replace(/Team 1/g, 'White Team').replace(/Team 2/g, 'Colour Team')
                        );
                    }
                    
                    const html = analyzer.generateHTMLReport(analysis);
                    
                    // Add share button to the results
                    const shareSection = `
                        <div class="share-section">
                            <button class="btn-share" onclick="shareAnalysis()">
                                <i class="fas fa-share-alt"></i> Share This Analysis
                            </button>
                            <div class="share-url mt-2" onclick="shareAnalysis()">
                                <small><i class="fas fa-link"></i> Click to copy shareable link</small>
                            </div>
                        </div>
                    `;
                    
                    document.getElementById('results').innerHTML = html + shareSection;
                    
                    // Update URL without reloading page
                    const url = generateShareableUrl();
                    if (url) {
                        window.history.pushState({}, '', url);
                    }
                    
                } catch (error) {
                    console.error("Analysis error:", error);
                    document.getElementById('results').innerHTML = `
                        <div class="analysis-card">
                            <div class="alert alert-danger">
                                Error during analysis: ${error.message}
                            </div>
                        </div>
                    `;
                }
            }, 100);
        }
        
        // Initialize
        loadData();
    </script>
</body>
</html>
